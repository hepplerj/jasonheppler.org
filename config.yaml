ignoreFiles:
  - _templates/

title: Jason A. Heppler
# Ordered theme fallback for the Fog & Pine migration:
# Hugo resolves project root -> pine -> big-sky. Pine wins as templates land;
# anything Pine doesn't define yet falls back to big-sky. Teardown = drop
# "big-sky" from this list and `rm -rf themes/big-sky`.
theme: ["pine", "big-sky"]
description: >-
  Jason Heppler is the senior web developer at the Roy Rosenzweig Center for
  History and New Media at George Mason University.
baseURL: "https://jasonheppler.org/"
copyright: 2008-2024
languageCode: en-us
footnoteReturnLinkContents: " "

permalinks:
  blog: "/:year/:month/:day/:slug/"
  notes: "/:year/:month/:day/:slug/"
  links: "/:year/:month/:day/:slug/"
  archive: "/:slug/"
  page: "/:section/:slug/"

taxonomies:
  category: categories
  tag: tags

params:
  Author:
    name: Jason Heppler
    email: jason@jasonheppler.org
  social:
    bluesky: https://bsky.app/profile/jasonheppler.org
    mastodon: https://hcommons.social/@jaheppler
    github: https://github.com/hepplerj
    linkedin: https://www.linkedin.com/in/jasonheppler
    microblog: https://updates.jasonheppler.org
    buymeacoffee: https://buymeacoffee.com/jasonheppler

outputs:
  home:
    - HTML
    - RSS
    - JSONFeed
    - JSON
  page:
    - HTML
  section:
    - HTML
    - RSS
    - JSONFeed
  term:
    - HTML
    - RSS
    - JSONFeed

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    guessSyntax: true
    style: nord
    lineNos: false
    tabWidth: 4
    codeFences: false

mediaTypes:
  "application/feed+json":
    suffixes:
      - json

outputFormats:
  RSS:
    mediatype: application/rss
    baseName: feed
  JSONFeed:
    mediaType: "application/feed+json"
    baseName: feed
    isPlainText: true
    notAlternative: false

sitemap:
  changefreq: weekly
  priority: 0.5
  filename: sitemap.xml

services:
  rss:
    limit: 20

menu:
  nav:
    - identifier: essays
      name: Essays
      url: /blog/
      weight: 1
    - identifier: notes
      name: Notes
      url: /notes/
      weight: 2
    - identifier: publications
      name: Publications
      url: /publications/
      weight: 3
    - identifier: digital-history
      name: Digital History
      url: /research/
      weight: 4
    - identifier: bookshelf
      name: Bookshelf
      url: /books/
      weight: 5
    - identifier: about
      name: About
      url: /about/
      weight: 6

enableGitInfo: true

security:
  funcs:
    getenv:
      - ^HUGO_
      - ^BLOG_

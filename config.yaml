ignoreFiles:
  - _templates/

title: Jason A. Heppler
# Ordered theme fallback for the v11 "Sagebrush" redesign:
# Hugo resolves project root -> sagebrush -> pine. Sagebrush (warm/serif,
# Western book-hero) currently overrides only the homepage; everything else
# falls back to Pine (minimal Fog & Pine) until reskinned into Sagebrush.
# (themes/big-sky/ remains parked but is out of the active list.)
theme: ["sagebrush", "pine"]
description: >-
  Jason Heppler is the senior web developer at the Roy Rosenzweig Center for
  History and New Media at George Mason University.
baseURL: "https://jasonheppler.org/"
copyright: 2008-2024
languageCode: en-us
footnoteReturnLinkContents: " "

permalinks:
  blog: "/:year/:month/:day/:slug/"
  microblog: "/:year/:month/:day/:slug/"
  archive: "/:slug/"
  page: "/:section/:slug/"

taxonomies:
  category: categories
  tag: tags

params:
  Author:
    name: Jason Heppler
    email: jason@jasonheppler.org
  social:
    bluesky: https://bsky.app/profile/jasonheppler.org
    mastodon: https://hcommons.social/@jaheppler
    github: https://github.com/hepplerj
    linkedin: https://www.linkedin.com/in/jasonheppler
    microblog: https://updates.jasonheppler.org
    buymeacoffee: https://buymeacoffee.com/jasonheppler

outputs:
  home:
    - HTML
    - RSS
    - JSONFeed
    - JSON
  page:
    - HTML
  section:
    - HTML
    - RSS
    - JSONFeed
  term:
    - HTML
    - RSS
    - JSONFeed

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    guessSyntax: true
    style: nord
    lineNos: false
    tabWidth: 4
    codeFences: false

mediaTypes:
  "application/feed+json":
    suffixes:
      - json

outputFormats:
  RSS:
    mediatype: application/rss
    baseName: feed
  JSONFeed:
    mediaType: "application/feed+json"
    baseName: feed
    isPlainText: true
    notAlternative: false

sitemap:
  changefreq: weekly
  priority: 0.5
  filename: sitemap.xml

services:
  rss:
    limit: 20

menu:
  nav:
    - identifier: essays
      name: Essays
      url: /blog/
      weight: 1
    - identifier: microblog
      name: Microblog
      url: /microblog/
      weight: 2
    - identifier: publications
      name: Publications
      url: /publications/
      weight: 3
    - identifier: digital-history
      name: Digital History
      url: /research/
      weight: 4
    - identifier: bookshelf
      name: Bookshelf
      url: /books/
      weight: 5
    - identifier: about
      name: About
      url: /about/
      weight: 6

enableGitInfo: true

security:
  funcs:
    getenv:
      - ^HUGO_
      - ^BLOG_

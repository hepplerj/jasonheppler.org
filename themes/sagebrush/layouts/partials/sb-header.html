<header class="bf-header">
  <a href="/" class="bf-wordmark">Jason A. Heppler</a>
  <button class="bf-nav-toggle lm-nav-toggle" type="button" aria-label="Menu" aria-expanded="false" aria-controls="lmNav">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <nav class="bf-nav" id="lmNav">
    <a href="/archive/"{{ if or (in (slice "blog" "microblog") .Section) (eq .RelPermalink "/archive/") }} class="bf-nav-active"{{ end }}>Writing</a>
    <a href="/publications/"{{ if eq .Section "publications" }} class="bf-nav-active"{{ end }}>Publications</a>
    <a href="/research/"{{ if or (eq .Section "projects") (eq .RelPermalink "/research/") }} class="bf-nav-active"{{ end }}>Digital History</a>
    <a href="/books/"{{ if eq .Section "books" }} class="bf-nav-active"{{ end }}>Bookshelf</a>
    <a href="/about/"{{ if eq .RelPermalink "/about/" }} class="bf-nav-active"{{ end }}>About</a>
  </nav>
</header>

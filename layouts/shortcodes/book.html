{{ $_hugo_config := `{ "version": 1 }` }}
<div class="book">
<h3>{{ .Get "title" }}</h3>
<p class="short-description">{{ .Get "publisher" }}, {{ .Get "year" }}</p>

{{ if (isset .Params "image") }}
{{ if .Get "url" }}<a href='{{ .Get "url" }}'>{{ end }}<img src='/assets/images/{{ .Get "image" }}' alt='{{ .Get "title" }}' loading="lazy" decoding="async">{{ if .Get "url" }}</a>{{ end }}
{{ end }}

{{ .Inner }}

</div>

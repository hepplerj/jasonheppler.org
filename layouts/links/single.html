{{ partial "head.html" . }}

<div class='pt-10 site-container content'>
  <div class="body">
    <article id='{{ urlize .Title }}' class="h-entry post">
      <section>
        <header>
          <h1 class="post-title"><a href='{{ .Permalink }}' class='p-name'><strong>{{ .Title }}</strong></a></h1>
        </header>

        {{ with .Params.image }}
        <img src="/assets/images/{{ . }}" alt="{{ $.Title }}" loading="lazy" decoding="async" />
        {{ end }}
        {{- if (.Param "ShowToc") }}
        {{- partial "toc.html" . }}
        {{- end }}
        <div class='post-body e-content'>
          {{ .Content }}
        </div>

        <p>Linked: <a href="{{ index .Params "external" }}">{{ index .Params "title" }} →</a></p>
      </section>
    </article>

    {{ partial "foot" . }}
  </div>
</div>

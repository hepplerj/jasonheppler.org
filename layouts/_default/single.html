{{ partial "head.html" . }}

<div class='pt-10 site-container content'>
  <div class="body">
    <header>
    {{ if .Params.page_type }}
    {{ else }}
    <h1>{{ .Title }}</h1>
    {{ end }}
    {{ partial "article-meta.html" . }}
  </header>
  {{- if (.Param "ShowToc") }}
  {{- partial "toc.html" . }}
  {{- end }}
{{ .Content }}
</div>
</div>

<div class="site-container">
{{ partial "foot.html" . }}
</div>

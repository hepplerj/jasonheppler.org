{{ partial "head.html" . }}

<div class="bs-section-list">
  {{ if not .IsHome }}
  <header class="bs-container-narrow bs-archive-header">
    <h1 class="bs-archive-title">{{ .Title }}</h1>
  </header>
  {{ end }}

  <div class="bs-container-narrow">
    {{ if .Content }}
    <div class="prose">
      {{ .Content }}
    </div>
    {{ else }}
    <ul>
      {{ range where .Pages ".Params.hidden" "!=" "true" }}
      <li style="padding: 8px 0;">
        <a href="{{ .Permalink }}" style="color: var(--color-ink); text-decoration: none; border-bottom: 1px solid var(--color-link-underline);">{{ .Title }}</a>
      </li>
      {{ end }}
    </ul>
    {{ end }}
  </div>
</div>

{{ partial "foot.html" . }}
